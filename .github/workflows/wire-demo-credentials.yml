name: Wire Demo Firebase Credentials

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wire-credentials:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: claude/fleetflow-migration-audit-SR9zz
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace placeholder credentials
        run: python3 - << 'PYEOF'
import sys

path = "index.html"
with open(path, "r", encoding="utf-8") as f:
    html = f.read()

replacements = [
    ('"REPLACE_DEMO_API_KEY"',       '"AIzaSyDs9Juo7DhtwlQdPDWpd00HxeLPXp9jpCE"'),
    ('"fleetflow-demo.appspot.com"', '"fleetflow-demo.firebasestorage.app"'),
    ('"REPLACE_DEMO_SENDER_ID"',     '"856236886417"'),
    ('"REPLACE_DEMO_APP_ID"',        '"1:856236886417:web:d5e1f7a9f2bda2de43f230"'),
]

for old, new in replacements:
    if old not in html:
        print(f"WARNING: Could not find {old}", file=sys.stderr)
    else:
        html = html.replace(old, new, 1)
        print(f"  OK: {old} -> {new}")

with open(path, "w", encoding="utf-8") as f:
    f.write(html)
print("Done.")
PYEOF

      - name: Commit updated credentials
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --stat
          git commit -m "Wire DEMO_FIREBASE_CONFIG to fleetflow-demo project

          - apiKey, messagingSenderId, appId set to real fleetflow-demo values
          - storageBucket corrected: appspot.com -> firebasestorage.app"

      - name: Push changes
        run: git push origin claude/fleetflow-migration-audit-SR9zz
