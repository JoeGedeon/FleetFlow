name: Apply Patch
on:
  push:
    branches:
      - claude/fleetflow-migration-audit-SR9zz
    paths:
      - .github/patches/theme_toggle.patch
jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/fleetflow-migration-audit-SR9zz
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply and commit
        run: |
          git apply .github/patches/theme_toggle.patch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add Dark/Light/System theme toggle"
          git push
      - name: Cleanup
        run: |
          git rm .github/patches/theme_toggle.patch .github/workflows/apply-theme-patch.yml
          git commit -m "Remove patch artifacts"
          git push
