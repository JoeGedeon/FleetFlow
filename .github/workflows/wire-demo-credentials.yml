name: Wire Demo Firebase Credentials

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wire-credentials:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: claude/fleetflow-migration-audit-SR9zz
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace placeholder credentials
        run: |
          sed -i 's|"REPLACE_DEMO_API_KEY"|"AIzaSyDs9Juo7DhtwlQdPDWpd00HxeLPXp9jpCE"|g' index.html
          sed -i 's|"fleetflow-demo.appspot.com"|"fleetflow-demo.firebasestorage.app"|g' index.html
          sed -i 's|"REPLACE_DEMO_SENDER_ID"|"856236886417"|g' index.html
          sed -i 's|"REPLACE_DEMO_APP_ID"|"1:856236886417:web:d5e1f7a9f2bda2de43f230"|g' index.html
          echo "Replacements applied. Verifying:"
          grep -n 'AIzaSyDs9' index.html | head -3
          grep -n '856236886417' index.html | head -3
          grep -n 'firebasestorage\.app' index.html | head -5

      - name: Commit updated credentials
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --stat
          git commit -m "Wire DEMO_FIREBASE_CONFIG to fleetflow-demo project

          - apiKey, messagingSenderId, appId replaced with real fleetflow-demo values
          - storageBucket corrected: appspot.com -> firebasestorage.app"

      - name: Push changes
        run: git push origin claude/fleetflow-migration-audit-SR9zz
